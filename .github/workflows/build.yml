name: Build Droply

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Droply.exe
            asset_name: Droply-windows.exe

          - os: macos-latest
            artifact_name: Droply
            asset_name: Droply-macos

          - os: ubuntu-latest
            artifact_name: Droply
            asset_name: Droply-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libegl1 \
            libfontconfig1 \
            libxrender1 \
            libx11-xcb1 \
            zlib1g-dev \
            libjpeg-dev

      - name: Install macOS system dependencies
        if: matrix.os == 'macos-latest'
        run: brew install libjpeg zlib

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Rename artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: mv dist/Droply dist/${{ matrix.asset_name }}

      # Upload — chaque artifact dans un dossier à son nom
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # ← indispensable pour créer une release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      # Montre la structure réelle pour déboguer si besoin
      - name: Show artifact structure
        run: find dist/ -type f

      # Déplace tout à plat dans dist/
      - name: Flatten artifacts
        run: |
          mv dist/Droply-windows.exe/Droply-windows.exe dist/Droply-windows.exe.bin || true
          mv dist/Droply-macos/Droply-macos             dist/Droply-macos.bin       || true
          mv dist/Droply-linux/Droply-linux             dist/Droply-linux.bin       || true
          # Renomme sans .bin
          mv dist/Droply-windows.exe.bin dist/Droply-windows.exe
          mv dist/Droply-macos.bin       dist/Droply-macos
          mv dist/Droply-linux.bin       dist/Droply-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Droply ${{ github.ref_name }}
          body: |
            ## Droply ${{ github.ref_name }}

            | Plateforme | Téléchargement |
            |-----------|----------------|
            | 🪟 Windows | `Droply-windows.exe` |
            | 🍎 macOS   | `Droply-macos` |
            | 🐧 Linux   | `Droply-linux` |

            ---

            > **macOS** — Si l'app est bloquée par Gatekeeper :
            > ```bash
            > xattr -cr ~/Downloads/Droply-macos && chmod +x ~/Downloads/Droply-macos
            > ```
          files: |
            dist/Droply-windows.exe
            dist/Droply-macos
            dist/Droply-linux
          draft: false
          prerelease: false