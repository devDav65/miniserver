name: Build Droply

on:
  push:
    tags:
      - 'v*'           # Se déclenche sur : git tag v1.0.0 && git push --tags

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Droply.exe
            asset_name: Droply-windows.exe
          - os: ubuntu-latest
            artifact_name: Droply
            asset_name: Droply-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build           # attend que les 2 builds soient finis
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Droply ${{ github.ref_name }}
          body: |
            ## Droply ${{ github.ref_name }}
            
            ### Téléchargements
            | Plateforme | Fichier |
            |-----------|---------|
            | Windows   | `Droply-windows.exe` |
            | Linux     | `Droply-linux` |
            
            ### Changements
            <!-- Décris tes changements ici -->
          files: |
            dist/Droply-windows.exe/Droply.exe
            dist/Droply-linux/Droply
          draft: false
          prerelease: false
