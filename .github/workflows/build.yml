name: Build Droply

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: Droply-windows.exe

          - os: macos-latest
            asset_name: Droply-macos

          - os: ubuntu-latest
            asset_name: Droply-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl1 libglib2.0-0 libxcb-xinerama0 libxcb-cursor0 \
            libxkbcommon-x11-0 libdbus-1-3 libegl1 libfontconfig1 \
            libxrender1 libx11-xcb1 zlib1g-dev libjpeg-dev

      - name: Install macOS system dependencies
        if: matrix.os == 'macos-latest'
        run: brew install libjpeg zlib

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      # Debug — voir ce que PyInstaller a produit
      - name: Show build output
        run: |
          find dist/ -type f

      # Renomme le binaire final avec le bon nom dans dist/
      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: mv dist/Droply.exe dist/Droply-windows.exe
        shell: bash

      - name: Rename artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: mv dist/Droply dist/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Show artifact structure
        run: find dist/ -type f

      # Flatten — sort les fichiers de leurs sous-dossiers
      - name: Flatten artifacts
        run: |
          find dist/ -type f -name "Droply-*" | while read f; do
            fname=$(basename "$f")
            mv "$f" "dist/$fname"
          done
          echo "=== Final ==="
          find dist/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Droply ${{ github.ref_name }}
          body: |
            ## Droply ${{ github.ref_name }}

            | Plateforme | Téléchargement |
            |-----------|----------------|
            | 🪟 Windows | `Droply-windows.exe` |
            | 🍎 macOS   | `Droply-macos` |
            | 🐧 Linux   | `Droply-linux` |

            ---

            > **macOS** — Si l'app est bloquée par Gatekeeper :
            > ```bash
            > xattr -cr ~/Downloads/Droply-macos && chmod +x ~/Downloads/Droply-macos
            > ```
          files: |
            dist/Droply-windows.exe
            dist/Droply-macos
            dist/Droply-linux
          draft: false
          prerelease: false